# Canvas Excalidraw vivant dans herdr.
#
# Édition à la souris dans le navigateur, miroir live dans un pane (protocole
# graphique Kitty), fichier .herdr/canvas.excalidraw comme source de vérité —
# lisible et modifiable par un agent.
#
# Installation : herdr plugin link herdr-plugins/excalidraw

id = "somtech.excalidraw"
name = "Excalidraw Canvas"
version = "0.1.0"
description = "Canvas Excalidraw partagé humain/agent : édition navigateur, miroir live dans un pane."
min_herdr_version = "0.7.0"
platforms = ["linux", "macos"]

# Bundle la page Excalidraw localement (aucun CDN : le plugin marche hors-ligne).
[[build]]
command = ["bash", "scripts/build.sh"]

# Le pane miroir. Il ne fait que suivre : toute l'édition passe par le navigateur.
[[panes]]
id = "canvas"
title = "Canvas"
placement = "split"
command = ["bash", "scripts/pane.sh"]

[[actions]]
id = "open"
title = "Open Excalidraw canvas"
description = "Démarre le canvas, ouvre le navigateur, et affiche le miroir dans un pane."
contexts = ["workspace"]
command = ["bash", "scripts/open.sh", "split"]

[[actions]]
id = "open-tab"
title = "Open Excalidraw canvas (tab)"
description = "Idem, mais le miroir occupe son propre onglet."
contexts = ["workspace"]
command = ["bash", "scripts/open.sh", "tab"]
